name: Release

on:
  workflow_dispatch:
    inputs:
      test_build:
        description: 'Create test builds'
        type: boolean
        required: true
        default: false

  pull_request_target:
    types:
      - closed
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '**.png'

env:
  REGISTRY_IMAGE: ghcr.io/pierredurrr/replex

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release
  cancel-in-progress: true

jobs:
  get-next-version:
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch' 
    uses: semantic-release-action/next-release-version/.github/workflows/next-release-version.yml@v4

  build:
    if: needs.get-next-version.outputs.new-release-published == 'true' || inputs.test_build
    name: Build - ${{ matrix.platform.release_for }}
    strategy:
      matrix:
        platform:
          - release_for: x86_64 Linux
            os: ubuntu-22.04
            docker: linux/amd64
            target: x86_64-unknown-linux-gnu
            bin: replex
            command: build

          - release_for: ARM64 Linux
            os: ubuntu-22.04
            docker: linux/arm64
            target: aarch64-unknown-linux-gnu
            bin: replex
            command: build

    runs-on: ${{ matrix.platform.os }}
    needs: 
      - get-next-version

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo & target directories
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.platform.target }}

      - name: Install semantic-release-cargo
        if: ${{ !inputs.test_build }}
        uses: taiki-e/install-action@v2
        with:
          tool: semantic-release-cargo@2

      - name: Prepare semantic-release for Rust
        if: ${{ !inputs.test_build }}
        run: semantic-release-cargo prepare ${{ needs.get-next-version.outputs.new-release-version }}

      - name: Build binary
        uses: houseabsolute/actions-rust-cross@v0
        with:
          command: ${{ matrix.platform.command }}
          target: ${{ matrix.platform.target }}
          args: "--locked --release"

      - name: Move bin
        run: |
          mkdir -p bin/${{ matrix.platform.target }}
          mv target/${{ matrix.platform.target }}/release/replex bin/${{ matrix.platform.target }}/${{ matrix.platform.bin }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.platform.target }}
          path: bin/*
          if-no-files-found: error
          retention-days: 1

  build-docker-images:
    runs-on: ubuntu-latest
    needs:
      - build
      - get-next-version

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download bin
        uses: actions/download-artifact@v4
        with:
          pattern: bin-*
          merge-multiple: true
          path: bin/

      - name: check bin path
        run: ls -al bin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          tags: |
            type=raw,value=${{ needs.get-next-version.outputs.new-release-version }},enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.PERSONAL_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: setup qemu
        uses: docker/setup-qemu-action@v3

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          push: true
          context: .
          platforms: linux/amd64,linux/arm64
          file: docker/Dockerfile.github
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-to: type=gha,mode=max
          cache-from: type=gha

  release:
    if: ${{ !inputs.test_build }}
    runs-on: ubuntu-latest
    needs:
      - build

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download bin
        uses: actions/download-artifact@v4
        with:
          pattern: bin-*
          merge-multiple: true
          path: bin/

      - name: Package as archive
        run: |
          mkdir -p assets
          cd bin
          for dir in */; do
              (
                  cd $dir
                  name=${dir%/}
                  chmod +x ./replex
                  tar czvf ../../assets/$name.tar.gz ./
              )
          done
          cd -

      - name: Invoke semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_TOKEN }}
        run: npx semantic-release@22
